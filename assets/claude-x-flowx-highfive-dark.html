<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 800px; height: 600px; overflow: hidden; background: transparent; }
  #stage { position: absolute; top: 0; left: 0; width: 800px; height: 600px; background: transparent; }

  @keyframes blink { 0%,88%,100% { transform: scaleY(1); } 92% { transform: scaleY(0.08); } 95% { transform: scaleY(1); } }

  @keyframes v5body {
    0% { transform: translate(0,0); } 20% { transform: translate(0,-8px); }
    38% { transform: translate(16px,-20px); } 50% { transform: translate(16px,-20px); }
    64% { transform: translate(0,-8px); } 80%,100% { transform: translate(0,0); }
  }
  @keyframes v5arm {
    0%,24% { transform: rotate(0deg) scaleX(1); } 40% { transform: rotate(-54deg) scaleX(1.9); }
    52% { transform: rotate(-54deg) scaleX(1.9); } 66% { transform: rotate(0deg) scaleX(1); } 100% { transform: rotate(0deg) scaleX(1); }
  }
  @keyframes v5x {
    0%,40% { transform: rotate(0deg); } 46% { transform: rotate(-7deg); }
    54% { transform: rotate(4deg); } 62% { transform: rotate(-1deg); } 68%,100% { transform: rotate(0deg); }
  }
  @keyframes v5spark {
    0%,40% { opacity:0; transform: scale(0.2); } 46% { opacity:1; transform: scale(1); }
    58% { opacity:0; transform: scale(1.5); } 100% { opacity:0; }
  }
</style>
</head>
<body>
<div id="stage">
  <div style="position:absolute; left:150px; top:320px; width:268px; height:172px; animation:v5body 3.4s ease-in-out infinite;">
    <div style="position:absolute; left:34px; top:0; width:200px; height:128px; background:#CA7656;"></div>
    <div style="position:absolute; left:66px; top:32px; width:16px; height:36px; background:#FAF9F5; transform-origin:center; animation:blink 3.4s ease-in-out infinite;"></div>
    <div style="position:absolute; left:186px; top:32px; width:16px; height:36px; background:#FAF9F5; transform-origin:center; animation:blink 3.4s ease-in-out infinite;"></div>
    <div style="position:absolute; left:0; top:74px; width:34px; height:25px; background:#CA7656;"></div>
    <div style="position:absolute; left:234px; top:74px; width:34px; height:25px; background:#CA7656; transform-origin:left center; animation:v5arm 3.4s ease-in-out infinite;"></div>
    <div style="position:absolute; left:52px; top:128px; width:20px; height:42px; background:#CA7656;"></div>
    <div style="position:absolute; left:96px; top:128px; width:20px; height:42px; background:#CA7656;"></div>
    <div style="position:absolute; left:152px; top:128px; width:20px; height:42px; background:#CA7656;"></div>
    <div style="position:absolute; left:196px; top:128px; width:20px; height:42px; background:#CA7656;"></div>
  </div>
  <div style="position:absolute; left:408px; top:314px; width:64px; height:64px; transform-origin:center; animation:v5spark 3.4s ease-in-out infinite;">
    <div style="position:absolute; top:26px; left:0; width:22px; height:12px; background:#FCB813;"></div>
    <div style="position:absolute; top:26px; left:42px; width:22px; height:12px; background:#FCB813;"></div>
    <div style="position:absolute; top:0; left:26px; width:12px; height:22px; background:#FCB813;"></div>
    <div style="position:absolute; top:42px; left:26px; width:12px; height:22px; background:#FCB813;"></div>
  </div>
  <div style="position:absolute; left:432px; top:206px; width:220px; height:220px; transform-origin:50% 100%; animation:v5x 3.4s ease-in-out infinite;">
    <svg viewBox="0 0 296 296" width="220" height="220" style="display:block; overflow:visible;">
      <path d="M255.769 231.28H40.4308V287.8H255.769V231.28Z" fill="#FCB813"></path>
      <path d="M181.031 89.0438L255.769 174.759H186.87L146.232 127.113L105.593 174.759H40.6643L115.169 89.9781L42.5329 8H111.665L150.202 53.0762L188.739 8H253.901L181.031 89.0438Z" fill="#FFFFFF"></path>
    </svg>
  </div>
</div>
<script>
  // Deterministic frame sampling: ?t=<seconds> freezes every animation at that
  // point in the 3.4s loop (all animations share the same duration).
  const m = location.search.match(/[?&]t=([0-9.]+)/);
  if (m) {
    const t = parseFloat(m[1]);
    const s = document.createElement('style');
    s.textContent = '*{animation-play-state:paused !important; animation-delay:-' + t + 's !important;}';
    document.head.appendChild(s);
  }
</script>
</body>
</html>
